<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Premium Image Gallery - Explore stunning photography collections">
  <meta name="theme-color" content="#0f172a">
  <title>PixelVault — Premium Image Gallery</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <a href="#main-content" class="skip-link" aria-label="Skip to main content">Skip to main content</a>

  <div id="loading-skeleton" class="skeleton" aria-hidden="true">
    <div class="skeleton-header">
      <div class="skeleton-box" style="width:200px;height:40px"></div>
      <div class="skeleton-box" style="width:300px;height:40px"></div>
    </div>
    <div class="skeleton-filters">
      <div class="skeleton-box" style="width:80px;height:36px;border-radius:18px"></div>
      <div class="skeleton-box" style="width:80px;height:36px;border-radius:18px"></div>
      <div class="skeleton-box" style="width:80px;height:36px;border-radius:18px"></div>
      <div class="skeleton-box" style="width:80px;height:36px;border-radius:18px"></div>
      <div class="skeleton-box" style="width:80px;height:36px;border-radius:18px"></div>
      <div class="skeleton-box" style="width:80px;height:36px;border-radius:18px"></div>
      <div class="skeleton-box" style="width:80px;height:36px;border-radius:18px"></div>
    </div>
    <div class="skeleton-grid">
      <div class="skeleton-box" style="height:300px"></div>
      <div class="skeleton-box" style="height:250px"></div>
      <div class="skeleton-box" style="height:350px"></div>
      <div class="skeleton-box" style="height:280px"></div>
      <div class="skeleton-box" style="height:320px"></div>
      <div class="skeleton-box" style="height:260px"></div>
      <div class="skeleton-box" style="height:340px"></div>
      <div class="skeleton-box" style="height:290px"></div>
    </div>
  </div>

  <header class="header" role="banner">
    <div class="container">
      <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="logo">
          <i class="fas fa-images" aria-hidden="true"></i>
          <span>PixelVault</span>
        </div>

        <div class="nav-controls">
          <div class="search-wrapper" role="search">
            <i class="fas fa-search search-icon" aria-hidden="true"></i>
            <input
              type="text"
              id="search-input"
              class="search-input"
              placeholder="Search images..."
              aria-label="Search images by title"
              autocomplete="off"
            >
            <button type="button" class="search-clear" id="search-clear" aria-label="Clear search">
              <i class="fas fa-times"></i>
            </button>
          </div>

          <div class="nav-actions">
            <button type="button" class="nav-action-btn shuffle-btn" id="shuffle-btn" aria-label="Shuffle images" title="Shuffle">
              <i class="fas fa-shuffle"></i>
            </button>
            <button type="button" class="nav-action-btn slideshow-btn" id="slideshow-btn" aria-label="Start slideshow" title="Slideshow">
              <i class="fas fa-play"></i>
            </button>
            <button type="button" class="nav-action-btn fullscreen-btn" id="fullscreen-btn" aria-label="Toggle fullscreen" title="Fullscreen">
              <i class="fas fa-expand"></i>
            </button>
            <button type="button" class="nav-action-btn theme-btn" id="theme-btn" aria-label="Toggle theme" title="Toggle theme">
              <i class="fas fa-moon"></i>
            </button>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main id="main-content">
    <section class="gallery-section" aria-label="Image gallery">
      <div class="container">
        <div class="gallery-header">
          <div class="gallery-stats">
            <h1 class="gallery-title" id="gallery-title">Explore Collections</h1>
            <p class="gallery-subtitle">
              <span id="visible-count">24</span> / <span id="total-count">24</span> images
            </p>
          </div>
          <div class="counter-strip">
            <div class="counter-item">
              <span class="counter-number" data-target="24">0</span>
              <span class="counter-label">Images</span>
            </div>
            <div class="counter-item">
              <span class="counter-number" data-target="8">0</span>
              <span class="counter-label">Categories</span>
            </div>
            <div class="counter-item">
              <span class="counter-number" data-target="0" id="favorites-counter">0</span>
              <span class="counter-label">Favorites</span>
            </div>
          </div>
        </div>

        <div class="filter-wrapper" role="tablist" aria-label="Filter by category">
          <button type="button" class="filter-btn active" data-filter="all" role="tab" aria-selected="true" aria-controls="gallery-grid">All</button>
          <button type="button" class="filter-btn" data-filter="nature" role="tab" aria-selected="false" aria-controls="gallery-grid">Nature</button>
          <button type="button" class="filter-btn" data-filter="city" role="tab" aria-selected="false" aria-controls="gallery-grid">City</button>
          <button type="button" class="filter-btn" data-filter="animals" role="tab" aria-selected="false" aria-controls="gallery-grid">Animals</button>
          <button type="button" class="filter-btn" data-filter="technology" role="tab" aria-selected="false" aria-controls="gallery-grid">Technology</button>
          <button type="button" class="filter-btn" data-filter="travel" role="tab" aria-selected="false" aria-controls="gallery-grid">Travel</button>
          <button type="button" class="filter-btn" data-filter="food" role="tab" aria-selected="false" aria-controls="gallery-grid">Food</button>
        </div>

        <div class="masonry-grid" id="gallery-grid" role="list">
        </div>

        <div class="no-results" id="no-results" aria-hidden="true">
          <i class="fas fa-search-minus" aria-hidden="true"></i>
          <p>No images found</p>
          <span>Try a different search or category</span>
        </div>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image lightbox" hidden>
    <div class="lightbox-overlay" id="lightbox-overlay"></div>
    <div class="lightbox-content">
      <div class="lightbox-header">
        <span class="lightbox-counter" id="lightbox-counter">1 / 24</span>
        <div class="lightbox-actions">
          <a class="lightbox-action-btn" id="lightbox-download" aria-label="Download image" title="Download" download>
            <i class="fas fa-download"></i>
          </a>
          <button type="button" class="lightbox-action-btn" id="lightbox-fav" aria-label="Toggle favorite" title="Add to favorites">
            <i class="fas fa-heart"></i>
          </button>
          <button type="button" class="lightbox-action-btn" id="lightbox-fullscreen" aria-label="Toggle fullscreen" title="Fullscreen">
            <i class="fas fa-expand"></i>
          </button>
          <button type="button" class="lightbox-action-btn" id="lightbox-close" aria-label="Close lightbox" title="Close (Esc)">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>

      <div class="lightbox-body">
        <button type="button" class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Previous image" title="Previous (Left arrow)">
          <i class="fas fa-chevron-left"></i>
        </button>

        <div class="lightbox-image-wrapper">
          <div class="lightbox-zoom-container" id="lightbox-zoom">
            <img id="lightbox-img" class="lightbox-img" src="" alt="" loading="lazy">
          </div>
          <div class="lightbox-info">
            <h3 id="lightbox-title" class="lightbox-title"></h3>
            <p id="lightbox-description" class="lightbox-description"></p>
            <span id="lightbox-category" class="lightbox-category-badge"></span>
          </div>
        </div>

        <button type="button" class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Next image" title="Next (Right arrow)">
          <i class="fas fa-chevron-right"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="slideshow-controls" id="slideshow-controls" hidden aria-label="Slideshow controls">
    <div class="slideshow-bar">
      <div class="slideshow-progress" id="slideshow-progress"></div>
    </div>
    <div class="slideshow-buttons">
      <button type="button" class="slideshow-nav-btn" id="slideshow-prev" aria-label="Previous slide">
        <i class="fas fa-backward-step"></i>
      </button>
      <button type="button" class="slideshow-nav-btn" id="slideshow-play-pause" aria-label="Pause slideshow">
        <i class="fas fa-pause"></i>
      </button>
      <button type="button" class="slideshow-nav-btn" id="slideshow-next" aria-label="Next slide">
        <i class="fas fa-forward-step"></i>
      </button>
      <button type="button" class="slideshow-nav-btn" id="slideshow-close" aria-label="Close slideshow">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="slideshow-speed">
      <label for="slideshow-speed-input">Speed:</label>
      <select id="slideshow-speed-input" aria-label="Slideshow speed">
        <option value="2000">2s</option>
        <option value="3000" selected>3s</option>
        <option value="5000">5s</option>
        <option value="8000">8s</option>
      </select>
    </div>
  </div>

  <button type="button" class="scroll-top-btn" id="scroll-top-btn" aria-label="Scroll to top" title="Back to top">
    <i class="fas fa-arrow-up"></i>
    <span class="scroll-progress" id="scroll-progress"></span>
  </button>

  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">
          <i class="fas fa-images" aria-hidden="true"></i>
          <span>PixelVault Gallery</span>
        </div>
        <p class="footer-text">&copy; <span id="year"></span> PixelVault. Crafted with <i class="fas fa-heart" aria-hidden="true"></i></p>
      </div>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
